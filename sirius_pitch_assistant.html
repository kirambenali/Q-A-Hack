<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirius AI | Pitch Cockpit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@1.33.0/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle-min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #E11D48;
            --primary-light: #FFF1F2;
            --accent: #6366F1;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --text: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-heading: 'Outfit', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-main); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; padding-top: 60px; }

        /* --- Navigation --- */
        .app-nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 1rem; z-index: 1000; }
        .logo { font-family: var(--font-heading); font-weight: 700; font-size: 1.1rem; color: var(--primary); }
        .room-status { font-size: 0.65rem; font-weight: 800; background: #DCFCE7; color: #166534; padding: 4px 12px; border-radius: 99px; }

        /* --- Layout --- */
        .page { display: none; padding: 1rem; width: 100%; max-width: 1000px; margin: 0 auto; min-height: calc(100vh - 60px); }
        .page.active { display: block; }

        /* --- Landing --- */
        .hero-card { background: var(--surface); padding: 2rem; border-radius: 20px; box-shadow: var(--shadow); text-align: center; margin-top: 2rem; border: 1px solid var(--border); }
        .input-premium { width: 100%; padding: 0.8rem 1.25rem; border: 1.5px solid var(--border); border-radius: 12px; font-size: 1rem; margin-bottom: 1rem; outline: none; }
        .btn-premium { background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-family: var(--font-heading); }

        /* --- AI Section --- */
        .ai-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px -1px var(--border); }
        .keyword-container { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; min-height: 32px; }
        .keyword-badge { 
            background: var(--surface); 
            color: var(--primary); 
            padding: 4px 12px; 
            border-radius: 6px; 
            font-family: var(--font-heading); 
            font-size: 0.8rem; 
            font-weight: 700; 
            box-shadow: var(--shadow-sm); 
            border: 1px solid var(--primary); 
            text-transform: uppercase;
            animation: pop 0.3s ease-out;
        }
        @keyframes pop { from { scale: 0.5; opacity: 0; } to { scale: 1; opacity: 1; } }
        .ai-label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.75rem; letter-spacing: 0.5px; }
        #llmOutput { font-size: 1.2rem; font-weight: 600; line-height: 1.5; color: var(--text); font-family: var(--font-heading); }

        /* --- Controls --- */
        .control-row { display: flex; gap: 0.5rem; margin-bottom: 2rem; position: sticky; top: 70px; z-index: 500; background: var(--bg); padding: 0.5rem 0; }
        #promptInput { flex: 1; border: 1.5px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; font-size: 1rem; outline: none; background: #fff; }
        .btn-icon { width: 48px; border-radius: 12px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        #recordBtn { background: var(--primary-light); color: var(--primary); font-size: 0.7rem; font-weight: 800; width: 60px; }
        .btn-send { background: var(--primary); color: white; }

        /* --- Room Section --- */
        .room-title { font-size: 1rem; font-weight: 800; margin-bottom: 1rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem; }
        .room-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
        .user-card { background: white; border: 1.5px solid var(--border); padding: 1rem; border-radius: 16px; position: relative; transition: 0.3s; }
        .user-card.highlight { border-color: var(--primary); background: var(--primary-light); transform: translateY(-3px); box-shadow: 0 4px 15px rgba(225, 29, 72, 0.1); }
        .user-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .pfp { width: 24px; height: 24px; background: #eee; border-radius: 50%; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; }
        .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .s-btn { border: 1.5px solid var(--border); background: #fff; padding: 12px 0; border-radius: 10px; font-size: 1.1rem; font-weight: 800; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .s-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- Snackbar --- */
        #snackbar { visibility: hidden; background: #111; color: #fff; padding: 12px 20px; border-radius: 12px; position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); font-weight: 700; font-size: 0.8rem; white-space: nowrap; z-index: 2000; }
        #snackbar.show { visibility: visible; animation: slideIn 0.3s; }
        @keyframes slideIn { from { bottom: 0; opacity: 0; } to { bottom: 20px; opacity: 1; } }

        /* --- Mobile Responsive Fixes --- */
        @media (max-width: 600px) {
            body { padding-top: 50px; }
            .app-nav { height: 50px; }
            .hero-card { padding: 1.5rem; margin-top: 1rem; }
            .ai-card { padding: 1rem; }
            #llmOutput { font-size: 1.1rem; }
            .users-grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
            .user-card { padding: 0.75rem; }
            .btn-row { gap: 0.25rem; }
            .s-btn { padding: 6px 0; font-size: 0.7rem; }
        }
    </style>
</head>

<body>

    <nav class="app-nav">
        <div class="logo">SIRIUS<span style="opacity: 0.5;">_ROOM</span></div>
        <div class="room-status">● LIVE</div>
    </nav>

    <!-- Page: Landing -->
    <div id="landingPage" class="page active">
        <div class="hero-card">
            <h2 style="font-family: var(--font-heading); margin-bottom: 1.5rem;">Join Team Session</h2>
            <input type="text" id="nameInput" class="input-premium" placeholder="Your Name">
            <div style="background: #f8fafc; padding: 1rem; border: 1.5px dashed var(--border); border-radius: 12px; margin-bottom: 1.5rem;">
                <p style="font-size: 0.65rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.5rem;">PITCH DECK / DOCUMENTATION</p>
                <input type="file" id="fileInput" multiple style="font-size: 0.7rem; width: 100%;">
            </div>
            <button class="btn-premium" onclick="joinRoom()">START PILOTING</button>
        </div>
    </div>

    <!-- Page: Cockpit -->
    <div id="roomPage" class="page">
        
        <div class="ai-card">
            <div class="keyword-container" id="keywordArea"></div>
            <div class="ai-label">AI Insights (Pitch optimized)</div>
            <div id="llmOutput">Waiting for keywords...</div>
        </div>

        <div class="control-row">
            <input type="text" id="promptInput" placeholder="Keyword..." onkeydown="if(event.key==='Enter')askAI()">
            <button class="btn-icon" id="recordBtn" onclick="toggleSTT()">REC</button>
            <button class="btn-icon btn-send" onclick="askAI()">➤</button>
        </div>

        <div class="room-title">Connected Team</div>
        <div class="users-grid" id="usersGrid"></div>

    </div>

    <div id="snackbar"></div>

    <script>
        const socket = io();
        let myId = "";
        let isRecording = false;

        function joinRoom() {
            const name = document.getElementById('nameInput').value.trim();
            const fileInput = document.getElementById('fileInput');
            if (!name) return alert("Enter your name");

            if (fileInput.files.length > 0) {
                const formData = new FormData();
                Array.from(fileInput.files).forEach(f => formData.append('files', f));
                formData.append('socketId', socket.id);
                fetch('/upload', { method: 'POST', body: formData });
            }

            socket.emit('join', name);
            myId = socket.id;
            document.getElementById('landingPage').classList.remove('active');
            document.getElementById('roomPage').classList.add('active');
        }

        socket.on('update-users', (users) => {
            const grid = document.getElementById('usersGrid');
            grid.innerHTML = "";
            users.forEach(u => {
                const card = document.createElement('div');
                card.id = `user-${u.id}`;
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="user-name"><div class="pfp">${u.name.substring(0,2).toUpperCase()}</div> ${u.name}</div>
                    <div class="score-grid">
                        ${[4, 6, 8, 9].map(num => `
                            <button class="s-btn ${u.score === num ? 'active' : ''}" 
                                    onclick="selectNum(${num})" 
                                    ${u.id !== socket.id ? 'style="pointer-events:none"' : ''}>
                                ${num}
                            </button>
                        `).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });
        });

        socket.on('highest-selected', (data) => {
            document.querySelectorAll('.user-card').forEach(c => c.classList.remove('highlight'));
            const winner = document.getElementById(`user-${data.id}`);
            if (winner) winner.classList.add('highlight');
            showSnackbar(`${data.name} prioritized ${data.score}`);
        });

        function selectNum(num) {
            // Local feedback
            const myCard = document.getElementById(`user-${socket.id}`);
            if (myCard) {
                myCard.querySelectorAll('.s-btn').forEach(b => {
                    const bNum = parseInt(b.innerText);
                    if (bNum === num) b.classList.toggle('active');
                    else b.classList.remove('active');
                });
            }
            socket.emit('select-num', num);
        }

        function showSnackbar(msg) {
            const sb = document.getElementById('snackbar');
            sb.innerText = msg;
            sb.className = "show";
            setTimeout(() => sb.className = "", 3000);
        }

        async function askAI() {
            const input = document.getElementById('promptInput');
            const keyword = input.value.trim();
            if (!keyword) return;

            input.value = "";
            socket.emit('ai-response-start');

            const config = window.AZURE_CONFIG.openai;
            const ep = config.endpoint.endsWith('/') ? config.endpoint : config.endpoint + '/';
            const url = `${ep}openai/deployments/${config.deployment}/chat/completions?api-version=2024-08-01-preview`;

            try {
                const contextRes = await fetch(`/context?socketId=${socket.id}`);
                const { context } = await contextRes.json();

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'api-key': config.key, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: 'system', content: `CONSIGNE CRITIQUE : Tu es l'assistant secret d'une équipe en plein pitch devant un jury. 
                            1. RÉPONSE ULTRA-COURTE : 1 à 2 lignes MAXIMUM. Jamais de phrases inutiles.
                            2. RÉACTIVITÉ : L'utilisateur va taper des mots-clés (ex: "20 feedback"). Interprète-les immédiatement pour donner la donnée chiffrée ou l'argument clé.
                            3. HYBRIDE : Utilise le contexte fourni en priorité. Si l'info manque, UTILISE TES CONNAISSANCES sur le projet/app pour donner une réponse crédible et percutante. Ne dis JAMAIS "je ne sais pas" ou "je n'ai pas de contexte".
                            4. TEXTE PRÊT À L'ORAL : Donne une réponse que l'utilisateur peut lire directement au jury.
                            
                            FORMAT DATA-POINTS OBLIGATOIRE (en début de réponse) : [MOT_CLÉ, CHIFFRE_CLÉ, DATE] --- Ta réponse...
                            Exemple : [$50M, 2024, USA] Le marché est de $50M en 2024 aux USA.

                            CONTEXTE DU PROJET :
                            ${context || "Fais de ton mieux avec tes connaissances générales sur les startups."}` },
                            { role: 'user', content: keyword }
                        ],
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n");
                    for (const line of lines) {
                        if (line.startsWith("data: ") && line !== "data: [DONE]") {
                            try {
                                const data = JSON.parse(line.substring(6));
                                socket.emit('ai-response-chunk', data.choices[0]?.delta?.content || "");
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) { socket.emit('ai-response-chunk', "(Error)"); }
        }

        socket.on('ai-response-start', () => {
            currentResponseFull = ""; // RESET buffer for new question
            const output = document.getElementById('llmOutput');
            output.innerText = "Processing...";
            document.getElementById('keywordArea').innerHTML = "";
            output.style.opacity = "0.5";
        });

        let currentResponseFull = "";
        socket.on('ai-response-chunk', (chunk) => {
            currentResponseFull += chunk;
            const output = document.getElementById('llmOutput');
            const keywordArea = document.getElementById('keywordArea');

            if (currentResponseFull.includes(']')) {
                const parts = currentResponseFull.split(']');
                const rawKeywords = parts[0].replace('[', '');
                let responsePart = parts.slice(1).join(']').replace('---', '').trim();
                
                // Real-time keyword rendering
                if (rawKeywords.trim()) {
                    keywordArea.innerHTML = rawKeywords.split(',').map(k => {
                        return `<div class="keyword-badge">${k.trim().toUpperCase()}</div>`;
                    }).join('');
                }
                
                output.innerText = responsePart;
                output.style.opacity = responsePart ? "1" : "0.5";
            } else {
                // Before we reach the ']', don't show the raw [brackets] in the output
                output.innerText = "Extracting key data...";
                output.style.opacity = "0.5";
            }
        });

        function toggleSTT() {
            const config = window.AZURE_CONFIG.speech;
            const btn = document.getElementById('recordBtn');
            if (isRecording) { isRecording = false; return; }
            const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(config.key, config.region);
            const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
            const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
            isRecording = true;
            btn.innerText = "...";
            recognizer.recognizeOnceAsync(result => {
                if (result.text) { document.getElementById('promptInput').value = result.text; askAI(); }
                isRecording = false; btn.innerText = "REC";
                recognizer.close();
            });
        }
    </script>
</body>

</html>
